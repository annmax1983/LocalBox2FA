<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalBox2FA - Support</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #181825;
      border: 1px solid #313244;
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .banner {
      background: linear-gradient(135deg, #1e1e2e, #313244);
      padding: 40px 32px 32px;
      text-align: center;
    }
    .banner-icon { font-size: 48px; margin-bottom: 12px; }
    .banner h1 {
      font-size: 28px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #4fc3f7, #a6e3a1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .banner p { color: #a6adc8; font-size: 14px; }
    .body { padding: 28px 32px; }
    .body h2 {
      font-size: 16px;
      color: #a6e3a1;
      margin-bottom: 14px;
    }
    .body ul {
      list-style: none;
      padding: 0;
      margin-bottom: 20px;
    }
    .body li {
      padding: 6px 0;
      font-size: 14px;
      color: #bac2de;
      border-bottom: 1px solid #1e1e2e;
    }
    .body li:last-child { border-bottom: none; }
    .body li::before { content: '✓ '; color: #a6e3a1; }
    .thank { margin-top: 20px; }
    .thank p {
      font-size: 14px;
      color: #bac2de;
      line-height: 1.7;
      margin-bottom: 10px;
    }
    .heart { color: #f38ba8; }
    .cta {
      text-align: center;
      padding: 20px 32px 28px;
      border-top: 1px solid #313244;
    }
    .cta p { font-size: 13px; color: #6c7086; margin-bottom: 14px; }
    .support-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #4fc3f7, #a6e3a1);
      color: #1e1e2e;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .support-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(79,195,247,0.3);
    }
    .footer {
      padding: 16px 32px;
      text-align: center;
      font-size: 12px;
      color: #6c7086;
      border-top: 1px solid #1e1e2e;
    }
    .footer a { color: #4fc3f7; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>

    <div class="cta">

        <img src="./assets/coffee.png" alt="" width="28" height="22" style="vertical-align:middle"> <span data-i18n="btnText"></span>

          'Prend en charge 6 langues, détectées automatiquement depuis le navigateur'
        ],

        thank: [

          'S\'il vous aide aussi, c\'est déjà la plus belle récompense.',

    };

    function detectLang() {
      const code = (navigator.language || 'en').split('-')[0].toLowerCase();
      return I18N[code] ? code : 'en';
    }

    function applyLang(lang) {
      const t = I18N[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.textContent = t[key];
      });
      document.getElementById('featureList').innerHTML = t.features.map(f => `<li>${f}</li>`).join('');
      document.getElementById('thankText').innerHTML = t.thank.map(p => `<p>${p}</p>`).join('');
      document.documentElement.lang = lang;
    }

    applyLang(detectLang());
  </script>
</body>
</html>
